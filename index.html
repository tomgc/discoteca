<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discoteca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-hover: #1c1c1c;
  --border: #252525;
  --text: #e8e4df;
  --text-dim: #8a8580;
  --accent: #c9a84c;
  --accent-dim: #8a7434;
  --tag-bg: #1e1a14;
  --tag-border: #3a3225;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

/* --- HEADER --- */
header {
  padding: 0.55rem 2rem;
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--accent);
}
header .separator {
  color: var(--text-dim);
  font-size: 0.7rem;
  font-weight: 300;
}
header p {
  color: var(--text-dim);
  font-size: 0.75rem;
  font-weight: 300;
  letter-spacing: 0.04em;
}

/* --- TOOLBAR --- */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.toolbar input, .toolbar select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.45rem 0.7rem;
  border-radius: 3px;
  font-family: var(--font-body);
  font-size: 0.82rem;
}
.toolbar input:focus, .toolbar select:focus {
  outline: none;
  border-color: var(--accent-dim);
}
.toolbar input[type="search"] { flex: 1; min-width: 160px; }
.toolbar select { min-width: 110px; }
.toggle-group {
  display: flex;
  gap: 0;
}
.toggle-group button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 0.45rem 0.9rem;
  font-family: var(--font-body);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.toggle-group button:first-child { border-radius: 3px 0 0 3px; }
.toggle-group button:last-child { border-radius: 0 3px 3px 0; border-left: none; }
.toggle-group button.active {
  background: var(--accent-dim);
  color: var(--text);
  border-color: var(--accent-dim);
}
.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 0.5rem;
}
.btn-export {
  background: transparent;
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  padding: 0.45rem 0.9rem;
  border-radius: 3px;
  font-family: var(--font-body);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-export:hover { background: var(--accent-dim); color: var(--bg); }
.counter {
  color: var(--text-dim);
  font-size: 0.78rem;
  align-self: center;
  letter-spacing: 0.04em;
}

/* --- GRID --- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1.2rem;
}
.card {
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
}
.card:hover { transform: translateY(-3px); }
.card-art {
  aspect-ratio: 1;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.card-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-art .placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 2.5rem;
  color: var(--accent-dim);
}
.card-fav {
  position: absolute;
  top: 6px;
  right: 6px;
  font-size: 0.85rem;
  opacity: 0.9;
}
.card-info {
  padding: 0.5rem 0.15rem 0;
}
.card-artist {
  font-size: 0.72rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-album {
  font-family: var(--font-display);
  font-size: 0.92rem;
  font-weight: 400;
  margin-top: 0.1rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.25rem;
}
.card-year {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-weight: 300;
}
.card-cat {
  font-size: 0.65rem;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.card-cat.cat-descartado { color: var(--text-dim); }
.card-dismissed { opacity: 0.4; }
.card-dismissed:hover { opacity: 0.7; }

/* --- MODAL --- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-overlay.open { display: flex; justify-content: center; padding: 2rem; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  max-width: 640px;
  width: 100%;
  align-self: flex-start;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 0.8rem;
  right: 1rem;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.4rem;
  cursor: pointer;
  z-index: 2;
}
.modal-close:hover { color: var(--text); }
.modal-art {
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
}
.modal-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.modal-body { padding: 1.5rem; }
.modal-artist {
  font-size: 0.78rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.modal-album {
  font-family: var(--font-display);
  font-size: 1.6rem;
  margin-top: 0.2rem;
}
.modal-detail-row {
  display: flex;
  flex-wrap: wrap;
  gap: 1.2rem;
  margin-top: 0.8rem;
  font-size: 0.82rem;
  color: var(--text-dim);
}
.modal-detail-row span { font-weight: 300; }
.modal-detail-row strong { color: var(--text); font-weight: 600; }
.modal-spotify-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 0.8rem;
  padding: 0.4rem 0.8rem;
  background: rgba(30, 215, 96, 0.1);
  border: 1px solid rgba(30, 215, 96, 0.25);
  border-radius: 3px;
  color: #1db954;
  font-size: 0.75rem;
  font-family: var(--font-body);
  text-decoration: none;
  transition: all 0.15s;
}
.modal-spotify-link:hover {
  background: rgba(30, 215, 96, 0.2);
  border-color: rgba(30, 215, 96, 0.4);
}
.modal-wikipedia {
  font-size: 0.78rem;
  color: var(--text-dim);
  line-height: 1.6;
  max-height: 200px;
  overflow-y: auto;
  padding-right: 0.5rem;
}
.modal-wiki-link {
  display: inline-block;
  margin-top: 0.5rem;
  font-size: 0.7rem;
  color: var(--accent);
  text-decoration: none;
  font-family: var(--font-body);
}
.modal-wiki-link:hover { text-decoration: underline; }

/* --- LISTEN TODAY --- */
.listen-today {
  margin-bottom: 1.5rem;
  padding: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.listen-today-title {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--accent);
  margin-bottom: 0.6rem;
}
.listen-today-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-bottom: 0.8rem;
}
.listen-today-tag {
  background: var(--tag-bg);
  border: 1px solid var(--tag-border);
  color: var(--text-dim);
  padding: 0.25rem 0.6rem;
  border-radius: 2px;
  font-size: 0.7rem;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
}
.listen-today-tag:hover {
  border-color: var(--accent-dim);
  color: var(--text);
}
.listen-today-result {
  display: none;
  gap: 0.8rem;
  align-items: center;
  padding: 0.6rem;
  background: rgba(201,168,76,0.04);
  border-radius: 3px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.listen-today-result.visible { display: flex; }
.listen-today-result:hover { opacity: 0.8; }
.listen-today-result img {
  width: 50px;
  height: 50px;
  border-radius: 2px;
  object-fit: cover;
  flex-shrink: 0;
}
.listen-today-result-info { min-width: 0; }
.listen-today-result-album {
  font-family: var(--font-display);
  font-size: 0.88rem;
}
.listen-today-result-meta {
  font-size: 0.68rem;
  color: var(--text-dim);
}

.modal-section {
  margin-top: 1.2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.modal-section h3 {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--accent);
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}
.modal-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.tag {
  background: var(--tag-bg);
  border: 1px solid var(--tag-border);
  padding: 0.2rem 0.55rem;
  border-radius: 2px;
  font-size: 0.72rem;
  color: var(--text-dim);
}
.tag-own {
  border-color: var(--accent-dim);
  color: var(--accent);
}

/* --- CATEGORY BUTTONS --- */
.modal-categories {
  display: flex;
  gap: 0.4rem;
  margin: 0.6rem 0;
  flex-wrap: wrap;
}
.modal-cat-btn {
  background: var(--tag-bg);
  border: 1px solid var(--tag-border);
  color: var(--text-dim);
  padding: 0.4rem 0.9rem;
  border-radius: 3px;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
.modal-cat-btn:hover {
  border-color: var(--accent-dim);
  color: var(--text);
}
.modal-cat-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(201,168,76,0.1);
}
.modal-cat-btn.dismiss { color: var(--text-dim); }
.modal-cat-btn.dismiss.active {
  border-color: #666;
  color: #999;
  background: rgba(100,100,100,0.1);
}
.modal-notes {
  width: 100%;
  min-height: 60px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.5rem;
  border-radius: 3px;
  font-family: var(--font-body);
  font-size: 0.82rem;
  resize: vertical;
}
.modal-notes:focus { outline: none; border-color: var(--accent-dim); }
.modal-tags-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.4rem 0.5rem;
  border-radius: 3px;
  font-family: var(--font-body);
  font-size: 0.8rem;
  margin-top: 0.4rem;
}
.modal-tags-input:focus { outline: none; border-color: var(--accent-dim); }
.modal-tags-hint {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.2rem;
}

/* --- MAIN LAYOUT (single column, sidebar removed) --- */
.main-layout {
  min-height: calc(100vh - 120px);
}

/* --- RELEASES BAR (fusión de sidebar + today-banner) --- */
.releases-bar {
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 2rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  overflow: hidden;
}
.releases-bar-nav {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  flex-shrink: 0;
}
.releases-bar-nav button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 22px;
  height: 22px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 0.65rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s;
}
.releases-bar-nav button:hover { border-color: var(--accent-dim); color: var(--text); }
.releases-bar-label {
  font-family: var(--font-display);
  font-size: 0.75rem;
  color: var(--text);
  min-width: 90px;
  text-align: center;
  white-space: nowrap;
}
.releases-bar-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}
.releases-bar-items {
  display: flex;
  gap: 0.6rem;
  overflow-x: auto;
  flex: 1;
  min-width: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  padding: 0.2rem 0;
}
.releases-bar-items::-webkit-scrollbar { height: 3px; }
.releases-bar-items::-webkit-scrollbar-track { background: transparent; }
.releases-bar-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.releases-bar-day-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
}
.releases-bar-day-label {
  font-size: 0.6rem;
  color: var(--text);
  font-family: var(--font-display);
  white-space: nowrap;
  letter-spacing: 0.02em;
  background: var(--accent-dim);
  padding: 0 0.5rem;
  border-radius: 2px;
  align-self: center;
  font-weight: 400;
  height: 32px;
  display: flex;
  align-items: center;
}
.releases-bar-day-label.is-today {
  background: var(--accent);
  font-weight: 600;
}
.releases-bar-day-items {
  display: flex;
  gap: 0.4rem;
}
.release-bar-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.release-bar-item:hover { opacity: 0.75; }
.release-bar-item img {
  width: 32px;
  height: 32px;
  border-radius: 2px;
  object-fit: cover;
  flex-shrink: 0;
}
.release-bar-item-info { min-width: 0; line-height: 1.25; }
.release-bar-item-album {
  font-family: var(--font-display);
  font-size: 0.72rem;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.release-bar-item-meta {
  font-size: 0.6rem;
  color: var(--text-dim);
}
.releases-bar-empty {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-style: italic;
  white-space: nowrap;
}

/* --- CONTENT (full width, no sidebar) --- */
.content {
  padding: 1.5rem 2rem 3rem;
  min-width: 0;
}

/* --- FEATURE PRESENTATION --- */
.feature {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 2rem;
  padding: 1.2rem;
  background:
    linear-gradient(135deg, rgba(201,168,76,0.04) 0%, transparent 60%),
    var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.2s;
  overflow: hidden;
}
.feature:hover { border-color: var(--accent-dim); }
.feature-art {
  width: 180px;
  height: 180px;
  flex-shrink: 0;
  border-radius: 2px;
  overflow: hidden;
}
.feature-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.feature-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
}
.feature-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  margin-bottom: 0.4rem;
  font-weight: 600;
}
.feature-album {
  font-family: var(--font-display);
  font-size: 1.5rem;
  line-height: 1.2;
  margin-bottom: 0.15rem;
}
.feature-artist {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
}
.feature-meta {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 0.5rem;
}
.feature-notes {
  font-size: 0.78rem;
  font-style: italic;
  color: var(--text-dim);
  line-height: 1.45;
  max-height: 2.9em;
  overflow: hidden;
}
.feature-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  margin-top: 0.5rem;
}

/* (today-banner removed — releases-bar replaces it) */

/* --- EMPTY STATE --- */
.empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-dim);
}
.empty p { font-size: 0.9rem; margin-top: 0.5rem; }

/* --- RESPONSIVE --- */
@media (max-width: 768px) {
  header h1 { font-size: 0.95rem; }
  .content { padding: 1rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }
  .toolbar { padding: 0.8rem 1rem; }
  .modal-overlay.open { padding: 0.5rem; }
  .feature { flex-direction: column; gap: 1rem; }
  .feature-art { width: 100%; height: 200px; }
  .releases-bar { padding: 0.5rem 1rem; }
  .release-bar-item-album { max-width: 120px; }
}
</style>
</head>
<body>

<header>
  <h1>Discoteca</h1>
  <span class="separator">·</span>
  <p id="subtitle">Personal record collection</p>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="Search artist, album, tag…" autocomplete="off">
  <select id="filter-genero"><option value="">Genre</option></select>
  <select id="filter-decada"><option value="">Decade</option></select>
  <select id="filter-categoria"><option value="">Category</option></select>
  <div class="toggle-group">
    <button id="btn-collection" class="active">Collection</button>
    <button id="btn-all">All</button>
  </div>
  <span class="counter" id="counter"></span>
  <div class="toolbar-right">
    <button class="btn-export" id="btn-export" title="Export personal edits as JSON">Export JSON</button>
  </div>
</div>

<!-- RELEASES BAR (fusión de sidebar + today-banner) -->
<div class="releases-bar" id="releases-bar">
  <div class="releases-bar-nav">
    <button id="cal-prev">◂</button>
    <span class="releases-bar-label" id="cal-month-label"></span>
    <button id="cal-next">▸</button>
  </div>
  <div class="releases-bar-divider"></div>
  <div class="releases-bar-items" id="releases-bar-items"></div>
</div>

<!-- LAYOUT PRINCIPAL: columna única -->
<div class="main-layout">

  <main class="content">

    <!-- WHAT SHOULD I LISTEN TO TODAY? -->
    <div class="listen-today" id="listen-today">
      <div class="listen-today-title">What should I listen to today?</div>
      <div class="listen-today-tags" id="listen-today-tags"></div>
      <div class="listen-today-result" id="listen-today-result"></div>
    </div>

    <!-- FEATURE PRESENTATION (disco aleatorio al entrar) -->
    <div class="feature" id="feature">
      <div class="feature-art" id="feature-art"></div>
      <div class="feature-info">
        <div class="feature-label">From the collection</div>
        <div class="feature-album" id="feature-album"></div>
        <div class="feature-artist" id="feature-artist"></div>
        <div class="feature-meta" id="feature-meta"></div>
        <div class="feature-notes" id="feature-notes"></div>
        <div class="feature-tags" id="feature-tags"></div>
      </div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <p style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent)">No results</p>
      <p>Try changing the filters</p>
    </div>
  </main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal-art" id="modal-art"></div>
    <div class="modal-body">
      <div class="modal-artist" id="modal-artist"></div>
      <div class="modal-album" id="modal-album"></div>
      <div class="modal-detail-row" id="modal-details"></div>
      <a class="modal-spotify-link" id="modal-spotify" href="#" target="_blank" rel="noopener" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Open in Spotify
      </a>

      <div class="modal-section" id="section-wikipedia" style="display:none">
        <h3>About this album</h3>
        <div class="modal-wikipedia" id="modal-wikipedia"></div>
        <a class="modal-wiki-link" id="modal-wiki-link" href="#" target="_blank" rel="noopener">Read more on Wikipedia →</a>
      </div>

      <div class="modal-section">
        <h3>Category</h3>
        <div class="modal-categories" id="modal-categories"></div>
      </div>

      <div class="modal-section" id="section-tags-lastfm" style="display:none">
        <h3>Last.fm Tags</h3>
        <div class="modal-tags" id="modal-tags-lastfm"></div>
      </div>

      <div class="modal-section">
        <h3>My Tags</h3>
        <div class="modal-tags" id="modal-tags-own"></div>
        <input type="text" class="modal-tags-input" id="modal-tags-input" placeholder="Add tag and press Enter">
        <div class="modal-tags-hint">Press Enter to add</div>
      </div>

      <div class="modal-section">
        <h3>Notes</h3>
        <textarea class="modal-notes" id="modal-notes" placeholder="Your personal notes about this album…"></textarea>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================================
// DISCOTECA — JavaScript
// ============================================================================
// Flujo: carga catalogo.json → aplica ediciones de localStorage → renderiza.
// Las ediciones (rating, favorito, notas, tags) se guardan en localStorage.
// "Exportar JSON" genera un archivo descargable con las ediciones.
// ============================================================================

// --- 1. CONFIGURACIÓN Y CONSTANTES (P11) -----------------------------------
// Todos los valores parametrizables viven aquí. Ningún string de UI ni
// número mágico debería aparecer suelto más abajo en el código.

const CONFIG = {
  dataFile: 'datos/catalogo.json',
  storageKey: 'discoteca_ediciones',
  storageVersion: 2,                             // versión del formato de ediciones
  requiredFields: ['id', 'artista', 'album'],
};

// Sistema de categorías (reemplaza rating + favorito)
const CATEGORIES = {
  masterpiece: { label: 'Masterpiece', icon: '◆', order: 1 },
  great:       { label: 'Great',       icon: '●', order: 2 },
  good:        { label: 'Good',        icon: '○', order: 3 },
  descartado:  { label: 'Dismiss',     icon: '×', order: 4 },
};
const VALID_CATEGORIES = Object.keys(CATEGORIES);

// Campos editables por el usuario desde la web
const EDITABLE_FIELDS = ['categoria', 'notas', 'tags_propios'];

// Textos de la interfaz (centralizados para futura traducción)
const UI = {
  subtitle:         'Personal record collection',
  searchPlaceholder:'Search artist, album, tag…',
  genreDefault:     'Genre',
  decadeDefault:    'Decade',
  categoryDefault:  'Category',
  toggleCollection: 'Collection',
  toggleAll:        'All',
  exportBtn:        'Export JSON',
  featureLabel:     'From the collection',
  emptyTitle:       'No results',
  emptyHint:        'Try changing the filters',
  tagsPlaceholder:  'Add tag and press Enter',
  tagsHint:         'Press Enter to add',
  notesPlaceholder: 'Your personal notes about this album…',
  yearsAgo:         (n) => `${n} year${n !== 1 ? 's' : ''} ago`,
  counterFormat:    (shown, total) => `${shown} / ${total}`,
};

const MONTHS = [
  'January', 'February', 'March', 'April', 'May', 'June',
  'July', 'August', 'September', 'October', 'November', 'December'
];
const DAYS = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];


// --- 2. ESTADO DE LA APLICACIÓN ---------------------------------------------

let catalogo = [];
let ediciones = {};  // { id: { categoria, notas, tags_propios } }
let currentId = null;
let viewMode = 'collection';  // 'collection' (oculta descartados) | 'all'


// --- 3. FUNCIONES UTILITARIAS (P8, P9, P13) ---------------------------------

// P13 — Logging: mensajes de consola informativos para diagnóstico
function log(msg) { console.log(`[Discoteca] ${msg}`); }
function warn(msg) { console.warn(`[Discoteca] ${msg}`); }

// P8 — Validación: verifica campos obligatorios después de load el JSON
function validateCatalog(data) {
  let valid = 0;
  let issues = 0;
  data.forEach((item, i) => {
    const missing = CONFIG.requiredFields.filter(f => !item[f]);
    if (missing.length > 0) {
      warn(`Álbum índice ${i}: faltan campos [${missing.join(', ')}]`);
      issues++;
    } else {
      valid++;
    }
  });
  log(`Validación: ${valid} álbumes OK, ${issues} con campos faltantes`);
  return issues;
}

// P9 — Resiliencia: localStorage con protección contra errores
function safeGetItem(key) {
  try {
    return localStorage.getItem(key);
  } catch (e) {
    warn(`Error leyendo localStorage key "${key}": ${e.message}`);
    return null;
  }
}

function safeSetItem(key, value) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (e) {
    warn(`Error escribiendo localStorage key "${key}": ${e.message}`);
    return false;
  }
}

// P9 — Resiliencia: escapar HTML para evitar inyección accidental
function escapeHtml(str) {
  if (typeof str !== 'string') return str;
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// --- CARGA -----------------------------------------------------------------

// Migración: convierte rating/favorito del formato viejo a categoria
// Misma lógica que construir.R aplica en el backend
function migrateToCategory(obj) {
  if (obj.categoria !== undefined) return; // ya migrado
  if (obj.favorito) {
    obj.categoria = 'masterpiece';
  } else if (obj.rating >= 4) {
    obj.categoria = 'great';
  } else if (obj.rating >= 2) {
    obj.categoria = 'good';
  } else {
    obj.categoria = null;
  }
  // Limpiar campos viejos
  delete obj.rating;
  delete obj.favorito;
}

async function load() {
  try {
    const resp = await fetch(CONFIG.dataFile);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    catalogo = await resp.json();
    log(`Catálogo cargado: ${catalogo.length} álbumes`);
  } catch (e) {
    warn(`Error cargando catálogo: ${e.message}`);
    catalogo = [];
  }

  // P8 — Validar integridad del catálogo
  validateCatalog(catalogo);

  // Migrar datos del catálogo si vienen con formato viejo
  catalogo.forEach(a => migrateToCategory(a));

  // Cargar ediciones de localStorage (P9 — con protección)
  const raw = safeGetItem(CONFIG.storageKey);
  if (raw) {
    try {
      ediciones = JSON.parse(raw);
    } catch (e) {
      warn(`Error parseando ediciones de localStorage: ${e.message}`);
      ediciones = {};
    }
  }

  // Migrar ediciones viejas en localStorage (una sola vez)
  let migradas = 0;
  Object.values(ediciones).forEach(ed => {
    if (ed.rating !== undefined || ed.favorito !== undefined) {
      migrateToCategory(ed);
      migradas++;
    }
  });
  if (migradas > 0) {
    log(`Migradas ${migradas} ediciones de rating/favorito → categoria`);
    safeSetItem(CONFIG.storageKey, JSON.stringify(ediciones));
  }

  // Aplicar ediciones al catálogo
  let edicionesAplicadas = 0;
  catalogo.forEach(a => {
    const ed = ediciones[a.id];
    if (ed) {
      EDITABLE_FIELDS.forEach(campo => {
        if (ed[campo] !== undefined) a[campo] = ed[campo];
      });
      edicionesAplicadas++;
    }
  });
  if (edicionesAplicadas > 0) {
    log(`Ediciones aplicadas desde localStorage: ${edicionesAplicadas} álbumes`);
  }

  populateFilters();
  render();
  renderFeature();
  renderListenToday();
  initCalendar();
}

// --- FILTROS ---------------------------------------------------------------

function populateFilters() {
  // Géneros
  const generos = new Set();
  catalogo.forEach(a => (a.generos || []).forEach(g => generos.add(g)));
  const selGen = document.getElementById('filter-genero');
  [...generos].sort().forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    selGen.appendChild(opt);
  });

  // Décadas
  const decadas = new Set();
  catalogo.forEach(a => {
    if (a.anio) decadas.add(Math.floor(a.anio / 10) * 10);
  });
  const selDec = document.getElementById('filter-decada');
  [...decadas].sort().forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d + 's';
    selDec.appendChild(opt);
  });

  // Categorías
  const selCat = document.getElementById('filter-categoria');
  VALID_CATEGORIES.forEach(key => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = CATEGORIES[key].label;
    selCat.appendChild(opt);
  });
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const genero = document.getElementById('filter-genero').value;
  const decada = document.getElementById('filter-decada').value;
  const categoria = document.getElementById('filter-categoria').value;

  return catalogo.filter(a => {
    // Toggle Collection/All: Collection oculta descartados
    if (viewMode === 'collection' && a.categoria === 'descartado') return false;
    if (genero && !(a.generos || []).includes(genero)) return false;
    if (decada && Math.floor(a.anio / 10) * 10 !== parseInt(decada)) return false;
    if (categoria && a.categoria !== categoria) return false;
    if (q) {
      const blob = [
        a.artista, a.album, ...(a.generos || []),
        ...(a.tags_lastfm || []), ...(a.tags_propios || []),
        a.sello || '', a.notas || '', a.categoria || ''
      ].join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

// --- RENDER ----------------------------------------------------------------

function renderCategoryBadge(cat) {
  if (!cat || !CATEGORIES[cat]) return '';
  const c = CATEGORIES[cat];
  return `<span class="card-cat cat-${cat}">${c.icon}</span>`;
}

function render() {
  const filtrados = getFiltered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  document.getElementById('counter').textContent =
    UI.counterFormat(filtrados.length, catalogo.length);

  if (filtrados.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtrados.map(a => {
    const dimClass = a.categoria === 'descartado' ? ' card-dismissed' : '';
    return `
    <div class="card${dimClass}" data-id="${a.id}">
      <div class="card-art">
        ${a.artwork_url
          ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}" loading="lazy">`
          : `<div class="placeholder">${escapeHtml(a.album.charAt(0))}</div>`
        }
        ${a.categoria === 'masterpiece' ? '<span class="card-fav">◆</span>' : ''}
      </div>
      <div class="card-info">
        <div class="card-artist">${escapeHtml(a.artista)}</div>
        <div class="card-album">${escapeHtml(a.album)}</div>
        <div class="card-meta">
          <span class="card-year">${a.anio || ''}</span>
          ${renderCategoryBadge(a.categoria)}
        </div>
      </div>
    </div>`;
  }).join('');

  // Event listeners para abrir modal
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
  });

  // Ocultar feature cuando hay filtros activos
  updateFeatureVisibility();
}

// --- MODAL -----------------------------------------------------------------

function openModal(id) {
  const a = catalogo.find(x => x.id === id);
  if (!a) return;
  currentId = id;

  // Artwork
  document.getElementById('modal-art').innerHTML = a.artwork_url
    ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}">`
    : '';

  // Info (textContent ya es seguro — no necesita escape)
  document.getElementById('modal-artist').textContent = a.artista;
  document.getElementById('modal-album').textContent = a.album;

  // Detalles
  const detalles = [];
  if (a.anio) detalles.push(`<span>${a.anio}</span>`);
  if (a.sello) detalles.push(`<span>${escapeHtml(a.sello)}</span>`);
  if (a.pais) detalles.push(`<span>${escapeHtml(a.pais)}</span>`);
  if (a.num_tracks) detalles.push(`<span>${a.num_tracks} tracks</span>`);
  if (a.duracion_total_min) detalles.push(`<span>${a.duracion_total_min} min</span>`);
  if (a.scrobbles > 0) detalles.push(`<span><strong>${a.scrobbles}</strong> scrobbles</span>`);
  if (a.primer_scrobble) detalles.push(`<span>desde ${escapeHtml(a.primer_scrobble)}</span>`);
  document.getElementById('modal-details').innerHTML = detalles.join('');

  // Link a Spotify
  const spotifyLink = document.getElementById('modal-spotify');
  if (a.spotify_url) {
    spotifyLink.href = a.spotify_url;
    spotifyLink.style.display = 'inline-flex';
  } else {
    spotifyLink.style.display = 'none';
  }

  // Wikipedia (solo para masterpieces con extracto)
  const wikiSection = document.getElementById('section-wikipedia');
  if (a.wikipedia_extract && a.wikipedia_extract.length > 0) {
    document.getElementById('modal-wikipedia').textContent = a.wikipedia_extract;
    const wikiLink = document.getElementById('modal-wiki-link');
    if (a.wikipedia_url) {
      wikiLink.href = a.wikipedia_url;
      wikiLink.style.display = 'inline-block';
    } else {
      wikiLink.style.display = 'none';
    }
    wikiSection.style.display = 'block';
  } else {
    wikiSection.style.display = 'none';
  }

  // Categoría (botones clickeables)
  renderCategoryButtons(a.categoria);

  // Tags Last.fm
  const tagsLfm = a.tags_lastfm || [];
  const sectionLfm = document.getElementById('section-tags-lastfm');
  if (tagsLfm.length > 0) {
    sectionLfm.style.display = 'block';
    document.getElementById('modal-tags-lastfm').innerHTML =
      tagsLfm.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  } else {
    sectionLfm.style.display = 'none';
  }

  // Tags propios
  renderOwnTags(a.tags_propios || []);

  // Notas
  document.getElementById('modal-notes').value = a.notas || '';

  // Abrir
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderCategoryButtons(currentCat) {
  const container = document.getElementById('modal-categories');
  container.innerHTML = VALID_CATEGORIES.map(key => {
    const c = CATEGORIES[key];
    const isActive = currentCat === key;
    const dismissClass = key === 'descartado' ? ' dismiss' : '';
    return `<button class="modal-cat-btn${dismissClass}${isActive ? ' active' : ''}" 
            data-cat="${key}">${c.icon} ${c.label}</button>`;
  }).join('');

  // Event listeners
  container.querySelectorAll('.modal-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => setCategory(btn.dataset.cat));
  });
}

function setCategory(cat) {
  const a = catalogo.find(x => x.id === currentId);
  if (!a) return;
  // Click en la misma categoría = desclasificar (volver a null)
  a.categoria = (a.categoria === cat) ? null : cat;
  saveEdit(currentId, 'categoria', a.categoria);
  renderCategoryButtons(a.categoria);
  render();
}

function closeModal() {
  // Guardar notas al cerrar
  if (currentId) {
    const notas = document.getElementById('modal-notes').value;
    saveEdit(currentId, 'notas', notas);
  }
  currentId = null;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderOwnTags(tags) {
  document.getElementById('modal-tags-own').innerHTML =
    tags.map((t, i) => `<span class="tag tag-own">${escapeHtml(t)} <span style="cursor:pointer;margin-left:3px" data-idx="${i}">&times;</span></span>`).join('');

  // Borrar tag al clickear la X
  document.querySelectorAll('#modal-tags-own [data-idx]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = catalogo.find(x => x.id === currentId);
      if (!a) return;
      const idx = parseInt(el.dataset.idx);
      a.tags_propios.splice(idx, 1);
      saveEdit(currentId, 'tags_propios', [...a.tags_propios]);
      renderOwnTags(a.tags_propios);
    });
  });
}

function addTag(e) {
  if (e.key !== 'Enter') return;
  const input = e.target;
  const val = input.value.trim();
  if (!val) return;

  const a = catalogo.find(x => x.id === currentId);
  if (!a) return;
  if (!a.tags_propios) a.tags_propios = [];
  if (!a.tags_propios.includes(val)) {
    a.tags_propios.push(val);
    saveEdit(currentId, 'tags_propios', [...a.tags_propios]);
    renderOwnTags(a.tags_propios);
  }
  input.value = '';
}

// --- FEATURE PRESENTATION --------------------------------------------------
// Muestra un disco aleatorio como "pieza destacada" al entrar.
// Cambia cada vez que recargas la página.

function renderFeature() {
  if (catalogo.length === 0) {
    document.getElementById('feature').style.display = 'none';
    return;
  }

  // Elegir disco: excluir descartados, priorizar los que tienen categoría
  const candidatos = catalogo.filter(a => a.categoria !== 'descartado');
  if (candidatos.length === 0) {
    document.getElementById('feature').style.display = 'none';
    return;
  }
  const clasificados = candidatos.filter(a => a.categoria);
  const pool = clasificados.length > 0 ? clasificados : candidatos;
  const a = pool[Math.floor(Math.random() * pool.length)];

  const featureEl = document.getElementById('feature');
  featureEl.style.display = 'flex';
  featureEl.onclick = () => openModal(a.id);

  // Artwork
  document.getElementById('feature-art').innerHTML = a.artwork_url
    ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}">`
    : '';

  // Info (textContent ya es seguro)
  document.getElementById('feature-album').textContent = a.album;
  document.getElementById('feature-artist').textContent = a.artista;

  // Meta (incluye categoría si tiene)
  const metaParts = [a.anio, a.sello, a.num_tracks ? a.num_tracks + ' tracks' : '']
    .filter(Boolean);
  if (a.categoria && CATEGORIES[a.categoria]) {
    metaParts.push(CATEGORIES[a.categoria].icon + ' ' + CATEGORIES[a.categoria].label);
  }
  document.getElementById('feature-meta').textContent = metaParts.join(' · ');

  // Notas (si tiene)
  const notesEl = document.getElementById('feature-notes');
  if (a.notas) {
    notesEl.textContent = '« ' + a.notas + ' »';
    notesEl.style.display = 'block';
  } else {
    notesEl.style.display = 'none';
  }

  // Tags propios
  const tagsEl = document.getElementById('feature-tags');
  if (a.tags_propios && a.tags_propios.length > 0) {
    tagsEl.innerHTML = a.tags_propios
      .map(t => `<span class="tag tag-own">${escapeHtml(t)}</span>`).join('');
  } else {
    tagsEl.innerHTML = '';
  }
}

// Ocultar feature y listen-today cuando hay búsqueda activa
function updateFeatureVisibility() {
  const q = document.getElementById('search').value.trim();
  const genero = document.getElementById('filter-genero').value;
  const decada = document.getElementById('filter-decada').value;
  const categoria = document.getElementById('filter-categoria').value;
  const hasFilter = q || genero || decada || categoria || viewMode === 'all';

  document.getElementById('feature').style.display = hasFilter ? 'none' : 'flex';
  document.getElementById('listen-today').style.display = hasFilter ? 'none' : 'block';
}

// --- "WHAT SHOULD I LISTEN TO TODAY?" ----------------------------------------
// Muestra tags populares como botones. Click en uno → sugiere un disco aleatorio
// de la colección que tenga ese tag. Usa tags de Last.fm y tags propios.

function renderListenToday() {
  if (catalogo.length === 0) {
    document.getElementById('listen-today').style.display = 'none';
    return;
  }

  // Recolectar tags y contar frecuencia (excluir descartados)
  const tagCount = {};
  catalogo.forEach(a => {
    if (a.categoria === 'descartado') return;
    const allTags = [...(a.tags_lastfm || []), ...(a.tags_propios || [])];
    allTags.forEach(t => {
      const key = t.toLowerCase();
      if (!tagCount[key]) tagCount[key] = { label: t, count: 0 };
      tagCount[key].count++;
    });
  });

  // Ordenar por frecuencia y tomar los top 12
  const sorted = Object.values(tagCount)
    .filter(t => t.count >= 3)  // mínimo 3 álbumes con ese tag
    .sort((a, b) => b.count - a.count)
    .slice(0, 12);

  // Mezclar para variedad (shuffle parcial)
  for (let i = sorted.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [sorted[i], sorted[j]] = [sorted[j], sorted[i]];
  }
  const displayed = sorted.slice(0, 8);

  const container = document.getElementById('listen-today-tags');
  container.innerHTML = displayed.map(t =>
    `<span class="listen-today-tag" data-tag="${escapeHtml(t.label)}">${escapeHtml(t.label)}</span>`
  ).join('');

  // Event listeners
  container.querySelectorAll('.listen-today-tag').forEach(btn => {
    btn.addEventListener('click', () => suggestAlbum(btn.dataset.tag));
  });
}

function suggestAlbum(tag) {
  const tagLower = tag.toLowerCase();
  const matches = catalogo.filter(a => {
    if (a.categoria === 'descartado') return false;
    const allTags = [...(a.tags_lastfm || []), ...(a.tags_propios || [])]
      .map(t => t.toLowerCase());
    return allTags.includes(tagLower);
  });

  const result = document.getElementById('listen-today-result');
  if (matches.length === 0) {
    result.classList.remove('visible');
    return;
  }

  const a = matches[Math.floor(Math.random() * matches.length)];
  result.innerHTML = `
    ${a.artwork_url ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}">` : ''}
    <div class="listen-today-result-info">
      <div class="listen-today-result-album">${escapeHtml(a.album)}</div>
      <div class="listen-today-result-meta">${escapeHtml(a.artista)} · ${a.anio}</div>
    </div>`;
  result.classList.add('visible');
  result.onclick = () => openModal(a.id);
}

// --- PERSISTENCIA ----------------------------------------------------------

function saveEdit(id, campo, valor) {
  if (!ediciones[id]) ediciones[id] = {};
  ediciones[id][campo] = valor;
  safeSetItem(CONFIG.storageKey, JSON.stringify(ediciones));
}

function exportJSON() {
  // Genera un array con todos los álbumes que tienen ediciones
  const exportData = catalogo
    .filter(a => ediciones[a.id])
    .map(a => {
      const obj = { id: a.id };
      // P10 — Claves ordenadas alfabéticamente para diffs Git limpios
      EDITABLE_FIELDS.forEach(campo => {
        if (a[campo] !== undefined) obj[campo] = a[campo];
      });
      return obj;
    });

  // P10 — Claves ordenadas en el JSON exportado
  const jsonStr = JSON.stringify(exportData, Object.keys(exportData[0] || {}).sort(), 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'ediciones_web.json';
  link.click();
  URL.revokeObjectURL(url);
}

// ============================================================================
// RELEASES BAR — Barra horizontal con releases del mes
// ============================================================================
// Fusiona el antiguo sidebar (lista cronológica) y el today-banner en una
// sola barra horizontal scrolleable. Muestra releases agrupados por día,
// con el día actual destacado visualmente.
// ============================================================================

let calYear, calMonth; // Estado del mes visible

function initCalendar() {
  const hoy = new Date();
  calYear = hoy.getFullYear();
  calMonth = hoy.getMonth();
  renderReleasesBar();
}

// Construye un mapa: "MM-DD" → [array de álbumes que se lanzaron ese día]
function buildReleaseMap() {
  const map = {};
  catalogo.forEach(a => {
    if (a.fecha_precision !== 'day' || !a.fecha_lanzamiento) return;
    const parts = a.fecha_lanzamiento.split('-');
    if (parts.length < 3) return;
    const key = parts[1] + '-' + parts[2]; // "05-02"
    if (!map[key]) map[key] = [];
    map[key].push(a);
  });
  return map;
}

function renderReleasesBar() {
  const releaseMap = buildReleaseMap();
  const hoy = new Date();
  const diasEnMes = new Date(calYear, calMonth + 1, 0).getDate();
  const mm = String(calMonth + 1).padStart(2, '0');
  const anioActual = hoy.getFullYear();

  // Label del mes
  document.getElementById('cal-month-label').textContent =
    MONTHS[calMonth] + ' ' + calYear;

  let html = '';
  let totalReleases = 0;

  for (let day = 1; day <= diasEnMes; day++) {
    const dd = String(day).padStart(2, '0');
    const key = mm + '-' + dd;
    const releases = releaseMap[key] || [];
    if (releases.length === 0) continue;

    const isToday = (calMonth === hoy.getMonth() &&
                     calYear === hoy.getFullYear() &&
                     day === hoy.getDate());

    const labelClass = isToday ? 'releases-bar-day-label is-today' : 'releases-bar-day-label';
    const dayLabel = MONTHS[calMonth].slice(0, 3) + ' ' + day;

    html += `<div class="releases-bar-day-group">`;
    html += `<div class="${labelClass}">${dayLabel}</div>`;
    html += `<div class="releases-bar-day-items">`;

    releases.forEach(a => {
      const aniosAtras = anioActual - a.anio;
      html += `
        <div class="release-bar-item" onclick="openModal('${a.id}')">
          ${a.artwork_url ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}">` : ''}
          <div class="release-bar-item-info">
            <div class="release-bar-item-album">${escapeHtml(a.album)}</div>
            <div class="release-bar-item-meta">${escapeHtml(a.artista)} · ${a.anio} (${UI.yearsAgo(aniosAtras)})</div>
          </div>
        </div>`;
    });

    html += `</div></div>`;
    totalReleases += releases.length;
  }

  if (totalReleases === 0) {
    html = `<div class="releases-bar-empty">No releases in ${MONTHS[calMonth]}</div>`;
  }

  document.getElementById('releases-bar-items').innerHTML = html;

  // Auto-scroll al día de hoy si estamos en el mes actual
  if (calMonth === hoy.getMonth() && calYear === hoy.getFullYear()) {
    const todayLabel = document.querySelector('.releases-bar-day-label.is-today');
    if (todayLabel) {
      const container = document.getElementById('releases-bar-items');
      const group = todayLabel.closest('.releases-bar-day-group');
      if (group && container) {
        // Scroll suave para centrar el día de hoy
        const offset = group.offsetLeft - container.offsetLeft - 20;
        container.scrollLeft = Math.max(0, offset);
      }
    }
  }
}

// Navegación de mes
document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderReleasesBar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderReleasesBar();
});
