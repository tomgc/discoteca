<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discoteca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="assets/icon.svg">
<meta name="theme-color" content="#c9a84c">

<!-- OpenGraph defaults (se actualizan dinámicamente al abrir un álbum)     -->
<!-- Nota: la mayoría de unfurlers (Twitter, Facebook, iMessage) no ejecutan -->
<!-- JS, así que verán estos defaults. Slack/Discord/Telegram sí ejecutan    -->
<!-- JS para el preview y verán el álbum específico.                         -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Discoteca">
<meta property="og:title" content="Discoteca">
<meta property="og:description" content="Personal record collection — 1375+ álbumes">
<meta property="og:image" content="https://tomgc.github.io/discoteca/assets/icon.svg">
<meta property="og:url" content="https://tomgc.github.io/discoteca/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Discoteca">
<meta name="twitter:description" content="Personal record collection">
<meta name="twitter:image" content="https://tomgc.github.io/discoteca/assets/icon.svg">
</head>
<body>

<header>
  <h1>Discoteca</h1>
  <span class="separator">·</span>
  <p id="subtitle">Personal record collection</p>
</header>

<div class="toolbar" role="search" aria-label="Catalog filters">
  <input type="search" id="search" placeholder="Search artist, album, tag…  (press / )" autocomplete="off" aria-label="Search artist, album or tag (shortcut: forward slash)">
  <select id="filter-genero" aria-label="Filter by genre"><option value="">Genre</option></select>
  <select id="filter-decada" aria-label="Filter by decade"><option value="">Decade</option></select>
  <select id="filter-categoria" aria-label="Filter by category"><option value="">Category</option></select>
  <div class="toggle-group" role="group" aria-label="View mode">
    <button id="btn-collection" class="active" aria-pressed="true">Collection</button>
    <button id="btn-all" aria-pressed="false">All</button>
  </div>
  <span class="counter" id="counter" aria-live="polite"></span>
  <div class="toolbar-right">
    <button class="btn-triage" id="btn-triage" title="Quick classify unrated albums" style="display:none">Triage</button>
    <button class="btn-stats" id="btn-stats" title="Collection statistics">Stats</button>
    <button class="btn-export" id="btn-export" title="Export personal edits as JSON">Export JSON</button>
  </div>
</div>

<!-- RELEASES BAR (fusión de sidebar + today-banner) -->
<div class="releases-bar" id="releases-bar" aria-label="Releases this month">
  <div class="releases-bar-nav">
    <button id="cal-prev" aria-label="Previous month">◂</button>
    <span class="releases-bar-label" id="cal-month-label"></span>
    <button id="cal-next" aria-label="Next month">▸</button>
  </div>
  <div class="releases-bar-divider"></div>
  <div class="releases-bar-items" id="releases-bar-items"></div>
</div>

<!-- TRIAGE MODE -->
<div class="triage-bar" id="triage-bar">
  <span class="triage-bar-title">Triage</span>
  <span class="triage-bar-counter" id="triage-counter"></span>
  <div class="triage-bar-actions">
    <button class="triage-cat-btn" data-cat="good" disabled>○ Good <span class="shortcut">1</span></button>
    <button class="triage-cat-btn" data-cat="great" disabled>● Great <span class="shortcut">2</span></button>
    <button class="triage-cat-btn" data-cat="masterpiece" disabled>◆ Masterpiece <span class="shortcut">3</span></button>
    <button class="triage-cat-btn dismiss" data-cat="descartado" disabled>× Dismiss <span class="shortcut">X</span></button>
    <div class="triage-divider"></div>
    <button class="triage-nav-btn" id="triage-next">Next batch →</button>
    <button class="triage-nav-btn" id="triage-exit">Exit</button>
  </div>
</div>
<div class="triage-grid" id="triage-grid"></div>

<!-- LAYOUT PRINCIPAL: columna única -->
<div class="main-layout" id="main-layout">

  <main class="content">

    <!-- WHAT SHOULD I LISTEN TO TODAY? -->
    <div class="listen-today" id="listen-today">
      <div class="listen-today-title">What should I listen to today?</div>
      <div class="listen-today-tags" id="listen-today-tags"></div>
      <div class="listen-today-result" id="listen-today-result"></div>
    </div>

    <!-- FEATURE PRESENTATION (disco aleatorio al entrar) -->
    <div class="feature" id="feature">
      <div class="feature-art" id="feature-art"></div>
      <div class="feature-info">
        <div class="feature-label">From the collection</div>
        <div class="feature-album" id="feature-album"></div>
        <div class="feature-artist" id="feature-artist"></div>
        <div class="feature-meta" id="feature-meta"></div>
        <div class="feature-notes" id="feature-notes"></div>
        <div class="feature-tags" id="feature-tags"></div>
      </div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <p style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent)">No results</p>
      <p>Try changing the filters</p>
    </div>
  </main>

</div>

<!-- STATS OVERLAY -->
<div class="stats-overlay" id="stats-overlay" role="dialog" aria-modal="true" aria-labelledby="stats-title">
  <div class="stats-panel">
    <button class="modal-close" id="stats-close" aria-label="Close">&times;</button>
    <h2 id="stats-title" class="stats-title">Collection statistics</h2>
    <div class="stats-grid" id="stats-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-album">
  <div class="modal" id="modal">
    <button class="modal-share" id="modal-share" title="Copy share link" aria-label="Copy share link">⎘</button>
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    <div class="modal-art" id="modal-art"></div>
    <div class="modal-body">
      <div class="modal-artist" id="modal-artist"></div>
      <div class="modal-album" id="modal-album"></div>
      <div class="modal-detail-row" id="modal-details"></div>
      <a class="modal-spotify-link" id="modal-spotify" href="#" target="_blank" rel="noopener" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Open in Spotify
      </a>

      <div class="modal-section" id="section-tracklist" style="display:none">
        <h3>Tracklist</h3>
        <div id="modal-tracklist"></div>
      </div>

      <div class="modal-section" id="section-wikipedia" style="display:none">
        <h3>About this album</h3>
        <div class="modal-wikipedia" id="modal-wikipedia"></div>
        <a class="modal-wiki-link" id="modal-wiki-link" href="#" target="_blank" rel="noopener">Read more on Wikipedia →</a>
      </div>

      <div class="modal-section">
        <h3>Category</h3>
        <div class="modal-categories" id="modal-categories"></div>
      </div>

      <div class="modal-section" id="section-tags-lastfm" style="display:none">
        <h3>Last.fm Tags</h3>
        <div class="modal-tags" id="modal-tags-lastfm"></div>
      </div>

      <div class="modal-section">
        <h3>My Tags</h3>
        <div class="modal-tags" id="modal-tags-own"></div>
        <input type="text" class="modal-tags-input" id="modal-tags-input" placeholder="Add tag and press Enter">
        <div class="modal-tags-hint">Press Enter to add</div>
      </div>

      <div class="modal-section">
        <h3>Notes</h3>
        <textarea class="modal-notes" id="modal-notes" placeholder="Your personal notes about this album…"></textarea>
      </div>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
