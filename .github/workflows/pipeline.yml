name: Pipeline (scheduled)

# Corre el pipeline completo cada domingo a las 09:00 UTC y abre PR
# con el catalogo.json actualizado si hay cambios.
#
# REQUIERE SECRETS (Settings → Secrets and variables → Actions):
#   - SPOTIFY_CLIENT_ID
#   - SPOTIFY_CLIENT_SECRET
#   - SPOTIFY_REFRESH_TOKEN     (token OAuth con scope user-library-read)
#   - LASTFM_API_KEY
#   - LASTFM_USER
#
# OPCIONAL (backup adicional en Gist privado, retención indefinida):
#   - BACKUP_GIST_ID            (id del Gist, creado vacío una vez)
#   - BACKUP_GIST_TOKEN         (PAT con scope `gist`)
#
# El job se salta automáticamente si faltan credenciales principales.
# El backup como artifact del workflow (90 días) siempre se hace.

on:
  schedule:
    - cron: '0 9 * * 0'        # domingos 09:00 UTC
  workflow_dispatch:            # botón manual

jobs:
  refresh:
    name: Refresh catalog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
      LASTFM_API_KEY:        ${{ secrets.LASTFM_API_KEY }}
      LASTFM_USER:           ${{ secrets.LASTFM_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no credentials
        if: env.SPOTIFY_CLIENT_ID == '' || env.LASTFM_API_KEY == ''
        run: |
          echo "::warning::Skipping — falta SPOTIFY_CLIENT_ID o LASTFM_API_KEY"
          exit 78    # neutral skip

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::jsonlite
            any::dplyr
            any::purrr
            any::stringr
            any::here
            any::janitor
            any::readr
            any::cli

      - name: Write .Renviron from secrets
        run: |
          cat > .Renviron <<EOF
          SPOTIFY_CLIENT_ID=$SPOTIFY_CLIENT_ID
          SPOTIFY_CLIENT_SECRET=$SPOTIFY_CLIENT_SECRET
          SPOTIFY_REFRESH_TOKEN=$SPOTIFY_REFRESH_TOKEN
          LASTFM_API_KEY=$LASTFM_API_KEY
          LASTFM_USER=$LASTFM_USER
          EOF

      - name: Run pipeline
        run: Rscript run_all.R

      - name: Remove .Renviron
        if: always()
        run: rm -f .Renviron

      # --- Backup del music_cache.json ----------------------------------
      # El cache vive solo en disco local del usuario y no entra al repo
      # (~30MB, en .gitignore). Lo subimos como artifact del workflow
      # (retención 90 días) para que recuperarlo sea trivial si se pierde.
      # Si configuras BACKUP_GIST_ID + BACKUP_GIST_TOKEN, también lo
      # actualiza en un Gist privado tuyo (retención indefinida).
      - name: Compress cache for backup
        if: success()
        run: |
          gzip -c datos/music_cache.json > music_cache.json.gz
          ls -lh music_cache.json.gz

      - name: Upload cache as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: music_cache-${{ github.run_number }}
          path: music_cache.json.gz
          retention-days: 90

      - name: Update Gist backup (opcional)
        if: success() && env.BACKUP_GIST_ID != '' && env.BACKUP_GIST_TOKEN != ''
        env:
          BACKUP_GIST_ID: ${{ secrets.BACKUP_GIST_ID }}
          BACKUP_GIST_TOKEN: ${{ secrets.BACKUP_GIST_TOKEN }}
        run: |
          # Gist no soporta binarios — usamos base64 del .gz
          base64 -w 0 music_cache.json.gz > music_cache.b64
          jq -n --arg content "$(cat music_cache.b64)" \
            '{description: "Discoteca music_cache backup (base64 gzip)", files: {"music_cache.json.gz.b64": {content: $content}}}' \
            > payload.json
          curl -fsSL -X PATCH \
            -H "Authorization: Bearer $BACKUP_GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/$BACKUP_GIST_ID" \
            -d @payload.json > /dev/null
          echo "Gist updated."

      - name: Open PR with changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Pipeline semanal: actualizar catalogo.json'
          branch: pipeline/weekly-refresh
          delete-branch: true
          title: 'Pipeline semanal: actualizar catalogo.json'
          body: |
            Refresh automático del pipeline.

            Diff: revisar `datos/catalogo.json` y `datos/catalogo_musica.csv`.
          add-paths: |
            datos/catalogo.json
            datos/catalogo_musica.csv
