<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discoteca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-hover: #1c1c1c;
  --border: #252525;
  --text: #e8e4df;
  --text-dim: #8a8580;
  --accent: #c9a84c;
  --accent-dim: #8a7434;
  --star-off: #333;
  --star-on: #c9a84c;
  --fav: #c9a84c;
  --tag-bg: #1e1a14;
  --tag-border: #3a3225;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

/* --- HEADER --- */
header {
  padding: 2.5rem 2rem 1.5rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-family: var(--font-display);
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
}
header p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 0.3rem;
  font-weight: 300;
  letter-spacing: 0.08em;
}

/* --- TOOLBAR --- */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.toolbar input, .toolbar select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.45rem 0.7rem;
  border-radius: 3px;
  font-family: var(--font-body);
  font-size: 0.82rem;
}
.toolbar input:focus, .toolbar select:focus {
  outline: none;
  border-color: var(--accent-dim);
}
.toolbar input[type="search"] { flex: 1; min-width: 160px; }
.toolbar select { min-width: 110px; }
.toggle-group {
  display: flex;
  gap: 0;
}
.toggle-group button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 0.45rem 0.9rem;
  font-family: var(--font-body);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.toggle-group button:first-child { border-radius: 3px 0 0 3px; }
.toggle-group button:last-child { border-radius: 0 3px 3px 0; border-left: none; }
.toggle-group button.active {
  background: var(--accent-dim);
  color: var(--text);
  border-color: var(--accent-dim);
}
.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 0.5rem;
}
.btn-export {
  background: transparent;
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  padding: 0.45rem 0.9rem;
  border-radius: 3px;
  font-family: var(--font-body);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-export:hover { background: var(--accent-dim); color: var(--bg); }
.counter {
  color: var(--text-dim);
  font-size: 0.78rem;
  align-self: center;
  letter-spacing: 0.04em;
}

/* --- GRID --- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1.2rem;
}
.card {
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
}
.card:hover { transform: translateY(-3px); }
.card-art {
  aspect-ratio: 1;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.card-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-art .placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 2.5rem;
  color: var(--accent-dim);
}
.card-fav {
  position: absolute;
  top: 6px;
  right: 6px;
  font-size: 0.85rem;
  opacity: 0.9;
}
.card-info {
  padding: 0.5rem 0.15rem 0;
}
.card-artist {
  font-size: 0.72rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-album {
  font-family: var(--font-display);
  font-size: 0.92rem;
  font-weight: 400;
  margin-top: 0.1rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.25rem;
}
.card-year {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-weight: 300;
}
.card-stars {
  font-size: 0.65rem;
  letter-spacing: 1px;
}

/* --- MODAL --- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-overlay.open { display: flex; justify-content: center; padding: 2rem; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  max-width: 640px;
  width: 100%;
  align-self: flex-start;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 0.8rem;
  right: 1rem;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.4rem;
  cursor: pointer;
  z-index: 2;
}
.modal-close:hover { color: var(--text); }
.modal-art {
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
}
.modal-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.modal-body { padding: 1.5rem; }
.modal-artist {
  font-size: 0.78rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.modal-album {
  font-family: var(--font-display);
  font-size: 1.6rem;
  margin-top: 0.2rem;
}
.modal-detail-row {
  display: flex;
  flex-wrap: wrap;
  gap: 1.2rem;
  margin-top: 0.8rem;
  font-size: 0.82rem;
  color: var(--text-dim);
}
.modal-detail-row span { font-weight: 300; }
.modal-detail-row strong { color: var(--text); font-weight: 600; }
.modal-section {
  margin-top: 1.2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.modal-section h3 {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--accent);
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}
.modal-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.tag {
  background: var(--tag-bg);
  border: 1px solid var(--tag-border);
  padding: 0.2rem 0.55rem;
  border-radius: 2px;
  font-size: 0.72rem;
  color: var(--text-dim);
}
.tag-own {
  border-color: var(--accent-dim);
  color: var(--accent);
}

/* --- EDITABLE FIELDS --- */
.modal-rating {
  display: flex;
  gap: 0.3rem;
  margin: 0.6rem 0;
}
.modal-rating span {
  font-size: 1.3rem;
  cursor: pointer;
  color: var(--star-off);
  transition: color 0.1s;
}
.modal-rating span.on { color: var(--star-on); }
.modal-fav-toggle {
  background: var(--tag-bg);
  border: 1px solid var(--tag-border);
  color: var(--text-dim);
  padding: 0.35rem 0.8rem;
  border-radius: 3px;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
}
.modal-fav-toggle.active {
  border-color: var(--accent);
  color: var(--accent);
}
.modal-notes {
  width: 100%;
  min-height: 60px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.5rem;
  border-radius: 3px;
  font-family: var(--font-body);
  font-size: 0.82rem;
  resize: vertical;
}
.modal-notes:focus { outline: none; border-color: var(--accent-dim); }
.modal-tags-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.4rem 0.5rem;
  border-radius: 3px;
  font-family: var(--font-body);
  font-size: 0.8rem;
  margin-top: 0.4rem;
}
.modal-tags-input:focus { outline: none; border-color: var(--accent-dim); }
.modal-tags-hint {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.2rem;
}

/* --- MAIN LAYOUT (2 columnas) --- */
.main-layout {
  display: grid;
  grid-template-columns: minmax(240px, 1fr) 3fr;
  min-height: calc(100vh - 180px);
}

/* --- SIDEBAR (columna izquierda) --- */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 1.2rem;
  position: sticky;
  top: 0;
  align-self: start;
  max-height: 100vh;
  overflow-y: auto;
}

/* --- CONTENT (columna derecha) --- */
.content {
  padding: 1.5rem 2rem 3rem;
  min-width: 0;
}

/* --- CALENDAR "Un día como hoy" --- */
.calendar-section {
  padding: 0;
}
.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;
}
.calendar-title {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--accent);
  font-weight: 400;
  letter-spacing: 0.04em;
}
.calendar-month-nav {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.calendar-month-nav button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 26px;
  height: 26px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s;
}
.calendar-month-nav button:hover { border-color: var(--accent-dim); color: var(--text); }
.calendar-month-label {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--text);
  min-width: 120px;
  text-align: center;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-dow {
  font-size: 0.62rem;
  color: var(--text-dim);
  text-align: center;
  padding: 0.2rem 0;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  color: var(--text-dim);
  border-radius: 2px;
  position: relative;
}
.cal-day.empty { visibility: hidden; }
.cal-day.has-release {
  background: var(--tag-bg);
  color: var(--accent);
  cursor: pointer;
  font-weight: 600;
  border: 1px solid var(--tag-border);
  transition: all 0.15s;
}
.cal-day.has-release:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--bg);
}
.cal-day.today {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
.cal-day.today.has-release {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
.cal-day .cal-dot {
  position: absolute;
  bottom: 2px;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--accent);
}
.cal-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--accent-dim);
  border-radius: 3px;
  padding: 0.4rem 0.6rem;
  white-space: nowrap;
  z-index: 20;
  font-size: 0.7rem;
  color: var(--text);
  pointer-events: none;
  max-width: 220px;
}
.cal-day.has-release:hover .cal-tooltip { display: block; }
.cal-tooltip-art {
  width: 28px;
  height: 28px;
  border-radius: 2px;
  object-fit: cover;
  display: inline-block;
  vertical-align: middle;
  margin-right: 0.4rem;
}
.cal-tooltip-text {
  display: inline-block;
  vertical-align: middle;
  line-height: 1.3;
}
.cal-tooltip-album {
  font-family: var(--font-display);
  font-size: 0.72rem;
}
.cal-tooltip-artist {
  font-size: 0.62rem;
  color: var(--text-dim);
}
.cal-tooltip-year {
  font-size: 0.6rem;
  color: var(--accent);
}

/* --- SIDEBAR RELEASES (discos de un día seleccionado) --- */
.sidebar-releases {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.sidebar-releases:empty {
  display: none;
}
.sidebar-release {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  padding: 0.4rem 0;
  cursor: pointer;
  transition: opacity 0.15s;
}
.sidebar-release:hover { opacity: 0.75; }
.sidebar-release img {
  width: 40px;
  height: 40px;
  border-radius: 2px;
  object-fit: cover;
  flex-shrink: 0;
}
.sidebar-release-info { min-width: 0; }
.sidebar-release-album {
  font-family: var(--font-display);
  font-size: 0.78rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-release-meta {
  font-size: 0.65rem;
  color: var(--text-dim);
}
.sidebar-day-label {
  font-size: 0.7rem;
  color: var(--accent);
  font-family: var(--font-display);
  margin-bottom: 0.3rem;
  font-style: italic;
}

/* --- FEATURE PRESENTATION --- */
.feature {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 2rem;
  padding: 1.2rem;
  background:
    linear-gradient(135deg, rgba(201,168,76,0.04) 0%, transparent 60%),
    var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.2s;
  overflow: hidden;
}
.feature:hover { border-color: var(--accent-dim); }
.feature-art {
  width: 180px;
  height: 180px;
  flex-shrink: 0;
  border-radius: 2px;
  overflow: hidden;
}
.feature-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.feature-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
}
.feature-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  margin-bottom: 0.4rem;
  font-weight: 600;
}
.feature-album {
  font-family: var(--font-display);
  font-size: 1.5rem;
  line-height: 1.2;
  margin-bottom: 0.15rem;
}
.feature-artist {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
}
.feature-meta {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 0.5rem;
}
.feature-notes {
  font-size: 0.78rem;
  font-style: italic;
  color: var(--text-dim);
  line-height: 1.45;
  max-height: 2.9em;
  overflow: hidden;
}
.feature-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  margin-top: 0.5rem;
}

/* Today banner */
.today-banner {
  display: none;
  padding: 0.8rem 2rem;
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.02));
  border-bottom: 1px solid var(--border);
}
.today-banner.visible { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.today-banner-label {
  font-family: var(--font-display);
  font-size: 0.82rem;
  color: var(--accent);
  white-space: nowrap;
  font-style: italic;
}
.today-release {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  transition: opacity 0.15s;
}
.today-release:hover { opacity: 0.8; }
.today-release img {
  width: 36px;
  height: 36px;
  border-radius: 2px;
  object-fit: cover;
}
.today-release-info {
  line-height: 1.3;
}
.today-release-album {
  font-family: var(--font-display);
  font-size: 0.82rem;
}
.today-release-meta {
  font-size: 0.68rem;
  color: var(--text-dim);
}

/* --- EMPTY STATE --- */
.empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-dim);
}
.empty p { font-size: 0.9rem; margin-top: 0.5rem; }

/* --- RESPONSIVE --- */
@media (max-width: 768px) {
  header h1 { font-size: 1.6rem; }
  .main-layout { grid-template-columns: 1fr; }
  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--border);
    position: static;
    max-height: none;
    padding: 1rem;
  }
  .content { padding: 1rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }
  .toolbar { padding: 0.8rem 1rem; }
  .modal-overlay.open { padding: 0.5rem; }
  .feature { flex-direction: column; gap: 1rem; }
  .feature-art { width: 100%; height: 200px; }
  .today-banner { padding: 0.6rem 1rem; }
}
</style>
</head>
<body>

<header>
  <h1>Discoteca</h1>
  <p id="subtitle">Catálogo personal de discos</p>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="Buscar artista, álbum, tag…" autocomplete="off">
  <select id="filter-genero"><option value="">Género</option></select>
  <select id="filter-decada"><option value="">Década</option></select>
  <select id="filter-rating"><option value="">Rating</option></select>
  <div class="toggle-group">
    <button id="btn-todos" class="active">Todos</button>
    <button id="btn-fav">Hall of Fame</button>
  </div>
  <span class="counter" id="counter"></span>
  <div class="toolbar-right">
    <button class="btn-export" id="btn-export" title="Exportar ediciones personales como JSON">Exportar JSON</button>
  </div>
</div>

<!-- TODAY BANNER (se muestra solo si hay releases hoy) -->
<div class="today-banner" id="today-banner"></div>

<!-- LAYOUT PRINCIPAL: 2 columnas -->
<div class="main-layout">

  <!-- COLUMNA IZQUIERDA: Calendario -->
  <aside class="sidebar">
    <div class="calendar-section" id="calendar-section">
      <div class="calendar-header">
        <span class="calendar-title">Un día como hoy…</span>
        <div class="calendar-month-nav">
          <button id="cal-prev">◂</button>
          <span class="calendar-month-label" id="cal-month-label"></span>
          <button id="cal-next">▸</button>
        </div>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>

    <!-- Release destacado del calendario (al clickear un día) -->
    <div class="sidebar-releases" id="sidebar-releases"></div>
  </aside>

  <!-- COLUMNA DERECHA: Feature + Grilla -->
  <main class="content">

    <!-- FEATURE PRESENTATION (disco aleatorio al entrar) -->
    <div class="feature" id="feature">
      <div class="feature-art" id="feature-art"></div>
      <div class="feature-info">
        <div class="feature-label">De la colección</div>
        <div class="feature-album" id="feature-album"></div>
        <div class="feature-artist" id="feature-artist"></div>
        <div class="feature-meta" id="feature-meta"></div>
        <div class="feature-notes" id="feature-notes"></div>
        <div class="feature-tags" id="feature-tags"></div>
      </div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <p style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent)">Sin resultados</p>
      <p>Prueba cambiando los filtros</p>
    </div>
  </main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal-art" id="modal-art"></div>
    <div class="modal-body">
      <div class="modal-artist" id="modal-artist"></div>
      <div class="modal-album" id="modal-album"></div>
      <div class="modal-detail-row" id="modal-details"></div>

      <div class="modal-section">
        <h3>Rating</h3>
        <div class="modal-rating" id="modal-rating"></div>
        <button class="modal-fav-toggle" id="modal-fav">★ Hall of Fame</button>
      </div>

      <div class="modal-section" id="section-tags-lastfm" style="display:none">
        <h3>Tags de Last.fm</h3>
        <div class="modal-tags" id="modal-tags-lastfm"></div>
      </div>

      <div class="modal-section">
        <h3>Mis tags</h3>
        <div class="modal-tags" id="modal-tags-own"></div>
        <input type="text" class="modal-tags-input" id="modal-tags-input" placeholder="Agregar tag y presionar Enter">
        <div class="modal-tags-hint">Presiona Enter para agregar</div>
      </div>

      <div class="modal-section">
        <h3>Notas</h3>
        <textarea class="modal-notes" id="modal-notes" placeholder="Tus notas personales sobre este disco…"></textarea>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================================
// DISCOTECA — JavaScript
// ============================================================================
// Flujo: carga catalogo.json → aplica ediciones de localStorage → renderiza.
// Las ediciones (rating, favorito, notas, tags) se guardan en localStorage.
// "Exportar JSON" genera un archivo descargable con las ediciones.
// ============================================================================

// --- 1. CONFIGURACIÓN Y CONSTANTES (P11) -----------------------------------
// Todos los valores parametrizables viven aquí. Ningún string de UI ni
// número mágico debería aparecer suelto más abajo en el código.

const CONFIG = {
  dataFile: 'datos/catalogo.json',
  storageKey: 'discoteca_ediciones',
  requiredFields: ['id', 'artista', 'album'],
  maxBannerReleases: 3,                        // cap para el banner "hoy"
};

// Campos editables por el usuario desde la web
const EDITABLE_FIELDS = ['rating', 'favorito', 'notas', 'tags_propios'];

// Textos de la interfaz (centralizados para futura traducción)
const UI = {
  subtitle:         'Catálogo personal de discos',
  searchPlaceholder:'Buscar artista, álbum, tag…',
  genreDefault:     'Género',
  decadeDefault:    'Década',
  ratingDefault:    'Rating',
  toggleAll:        'Todos',
  toggleFav:        'Hall of Fame',
  exportBtn:        'Exportar JSON',
  featureLabel:     'De la colección',
  emptyTitle:       'Sin resultados',
  emptyHint:        'Prueba cambiando los filtros',
  calendarTitle:    'Un día como hoy…',
  bannerLabel:      'Un día como hoy…',
  favActive:        '★ En el Hall of Fame',
  favInactive:      '☆ Agregar al Hall of Fame',
  tagsPlaceholder:  'Agregar tag y presionar Enter',
  tagsHint:         'Presiona Enter para agregar',
  notesPlaceholder: 'Tus notas personales sobre este disco…',
  yearsAgo:         (n) => `hace ${n} año${n !== 1 ? 's' : ''}`,
  counterFormat:    (shown, total) => `${shown} / ${total}`,
};

const MONTHS = [
  'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
  'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
];
const DAYS = ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sá', 'Do'];


// --- 2. ESTADO DE LA APLICACIÓN ---------------------------------------------

let catalogo = [];
let ediciones = {};  // { id: { rating, favorito, notas, tags_propios } }
let currentId = null;
let showFavOnly = false;


// --- 3. FUNCIONES UTILITARIAS (P8, P9, P13) ---------------------------------

// P13 — Logging: mensajes de consola informativos para diagnóstico
function log(msg) { console.log(`[Discoteca] ${msg}`); }
function warn(msg) { console.warn(`[Discoteca] ${msg}`); }

// P8 — Validación: verifica campos obligatorios después de cargar el JSON
function validateCatalog(data) {
  let valid = 0;
  let issues = 0;
  data.forEach((item, i) => {
    const missing = CONFIG.requiredFields.filter(f => !item[f]);
    if (missing.length > 0) {
      warn(`Álbum índice ${i}: faltan campos [${missing.join(', ')}]`);
      issues++;
    } else {
      valid++;
    }
  });
  log(`Validación: ${valid} álbumes OK, ${issues} con campos faltantes`);
  return issues;
}

// P9 — Resiliencia: localStorage con protección contra errores
function safeGetItem(key) {
  try {
    return localStorage.getItem(key);
  } catch (e) {
    warn(`Error leyendo localStorage key "${key}": ${e.message}`);
    return null;
  }
}

function safeSetItem(key, value) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (e) {
    warn(`Error escribiendo localStorage key "${key}": ${e.message}`);
    return false;
  }
}

// P9 — Resiliencia: escapar HTML para evitar inyección accidental
function escapeHtml(str) {
  if (typeof str !== 'string') return str;
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// --- CARGA -----------------------------------------------------------------

async function cargar() {
  try {
    const resp = await fetch(CONFIG.dataFile);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    catalogo = await resp.json();
    log(`Catálogo cargado: ${catalogo.length} álbumes`);
  } catch (e) {
    warn(`Error cargando catálogo: ${e.message}`);
    catalogo = [];
  }

  // P8 — Validar integridad del catálogo
  validateCatalog(catalogo);

  // Cargar ediciones de localStorage (P9 — con protección)
  const raw = safeGetItem(CONFIG.storageKey);
  if (raw) {
    try {
      ediciones = JSON.parse(raw);
    } catch (e) {
      warn(`Error parseando ediciones de localStorage: ${e.message}`);
      ediciones = {};
    }
  }

  // Aplicar ediciones al catálogo
  let edicionesAplicadas = 0;
  catalogo.forEach(a => {
    const ed = ediciones[a.id];
    if (ed) {
      EDITABLE_FIELDS.forEach(campo => {
        if (ed[campo] !== undefined) a[campo] = ed[campo];
      });
      edicionesAplicadas++;
    }
  });
  if (edicionesAplicadas > 0) {
    log(`Ediciones aplicadas desde localStorage: ${edicionesAplicadas} álbumes`);
  }

  poblarFiltros();
  renderizar();
  renderFeature();
  initCalendario();
}

// --- FILTROS ---------------------------------------------------------------

function poblarFiltros() {
  // Géneros
  const generos = new Set();
  catalogo.forEach(a => (a.generos || []).forEach(g => generos.add(g)));
  const selGen = document.getElementById('filter-genero');
  [...generos].sort().forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    selGen.appendChild(opt);
  });

  // Décadas
  const decadas = new Set();
  catalogo.forEach(a => {
    if (a.anio) decadas.add(Math.floor(a.anio / 10) * 10);
  });
  const selDec = document.getElementById('filter-decada');
  [...decadas].sort().forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d + 's';
    selDec.appendChild(opt);
  });

  // Rating
  const selRat = document.getElementById('filter-rating');
  for (let i = 5; i >= 1; i--) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = '★'.repeat(i);
    selRat.appendChild(opt);
  }
}

function obtenerFiltrados() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const genero = document.getElementById('filter-genero').value;
  const decada = document.getElementById('filter-decada').value;
  const rating = document.getElementById('filter-rating').value;

  return catalogo.filter(a => {
    if (showFavOnly && !a.favorito) return false;
    if (genero && !(a.generos || []).includes(genero)) return false;
    if (decada && Math.floor(a.anio / 10) * 10 !== parseInt(decada)) return false;
    if (rating && a.rating < parseInt(rating)) return false;
    if (q) {
      const blob = [
        a.artista, a.album, ...(a.generos || []),
        ...(a.tags_lastfm || []), ...(a.tags_propios || []),
        a.sello || '', a.notas || ''
      ].join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

// --- RENDER ----------------------------------------------------------------

function renderStars(n) {
  let s = '';
  for (let i = 1; i <= 5; i++) s += i <= n ? '★' : '☆';
  return s;
}

function renderizar() {
  const filtrados = obtenerFiltrados();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  document.getElementById('counter').textContent =
    UI.counterFormat(filtrados.length, catalogo.length);

  if (filtrados.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtrados.map(a => `
    <div class="card" data-id="${a.id}">
      <div class="card-art">
        ${a.artwork_url
          ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}" loading="lazy">`
          : `<div class="placeholder">${escapeHtml(a.album.charAt(0))}</div>`
        }
        ${a.favorito ? '<span class="card-fav">★</span>' : ''}
      </div>
      <div class="card-info">
        <div class="card-artist">${escapeHtml(a.artista)}</div>
        <div class="card-album">${escapeHtml(a.album)}</div>
        <div class="card-meta">
          <span class="card-year">${a.anio || ''}</span>
          <span class="card-stars" style="color:var(--star-on)">${a.rating > 0 ? renderStars(a.rating) : ''}</span>
        </div>
      </div>
    </div>
  `).join('');

  // Event listeners para abrir modal
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => abrirModal(card.dataset.id));
  });

  // Ocultar feature cuando hay filtros activos
  updateFeatureVisibility();
}

// --- MODAL -----------------------------------------------------------------

function abrirModal(id) {
  const a = catalogo.find(x => x.id === id);
  if (!a) return;
  currentId = id;

  // Artwork
  document.getElementById('modal-art').innerHTML = a.artwork_url
    ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}">`
    : '';

  // Info (textContent ya es seguro — no necesita escape)
  document.getElementById('modal-artist').textContent = a.artista;
  document.getElementById('modal-album').textContent = a.album;

  // Detalles
  const detalles = [];
  if (a.anio) detalles.push(`<span>${a.anio}</span>`);
  if (a.sello) detalles.push(`<span>${escapeHtml(a.sello)}</span>`);
  if (a.pais) detalles.push(`<span>${escapeHtml(a.pais)}</span>`);
  if (a.num_tracks) detalles.push(`<span>${a.num_tracks} tracks</span>`);
  if (a.duracion_total_min) detalles.push(`<span>${a.duracion_total_min} min</span>`);
  if (a.scrobbles > 0) detalles.push(`<span><strong>${a.scrobbles}</strong> scrobbles</span>`);
  if (a.primer_scrobble) detalles.push(`<span>desde ${escapeHtml(a.primer_scrobble)}</span>`);
  document.getElementById('modal-details').innerHTML = detalles.join('');

  // Rating (estrellas clickeables)
  const ratingDiv = document.getElementById('modal-rating');
  ratingDiv.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const star = document.createElement('span');
    star.textContent = '★';
    star.className = i <= a.rating ? 'on' : '';
    star.addEventListener('click', () => setRating(i));
    ratingDiv.appendChild(star);
  }

  // Favorito
  const favBtn = document.getElementById('modal-fav');
  favBtn.className = 'modal-fav-toggle' + (a.favorito ? ' active' : '');
  favBtn.textContent = a.favorito ? UI.favActive : UI.favInactive;

  // Tags Last.fm
  const tagsLfm = a.tags_lastfm || [];
  const sectionLfm = document.getElementById('section-tags-lastfm');
  if (tagsLfm.length > 0) {
    sectionLfm.style.display = 'block';
    document.getElementById('modal-tags-lastfm').innerHTML =
      tagsLfm.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  } else {
    sectionLfm.style.display = 'none';
  }

  // Tags propios
  renderTagsPropios(a.tags_propios || []);

  // Notas
  document.getElementById('modal-notes').value = a.notas || '';

  // Abrir
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModal() {
  // Guardar notas al cerrar
  if (currentId) {
    const notas = document.getElementById('modal-notes').value;
    guardarEdicion(currentId, 'notas', notas);
  }
  currentId = null;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function setRating(n) {
  const a = catalogo.find(x => x.id === currentId);
  if (!a) return;
  a.rating = a.rating === n ? 0 : n;  // Click mismo = quitar
  guardarEdicion(currentId, 'rating', a.rating);
  // Re-render estrellas
  document.querySelectorAll('#modal-rating span').forEach((s, i) => {
    s.className = i < a.rating ? 'on' : '';
  });
  renderizar();
}

function toggleFavorito() {
  const a = catalogo.find(x => x.id === currentId);
  if (!a) return;
  a.favorito = !a.favorito;
  guardarEdicion(currentId, 'favorito', a.favorito);
  const btn = document.getElementById('modal-fav');
  btn.className = 'modal-fav-toggle' + (a.favorito ? ' active' : '');
  btn.textContent = a.favorito ? UI.favActive : UI.favInactive;
  renderizar();
}

function renderTagsPropios(tags) {
  document.getElementById('modal-tags-own').innerHTML =
    tags.map((t, i) => `<span class="tag tag-own">${escapeHtml(t)} <span style="cursor:pointer;margin-left:3px" data-idx="${i}">&times;</span></span>`).join('');

  // Borrar tag al clickear la X
  document.querySelectorAll('#modal-tags-own [data-idx]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = catalogo.find(x => x.id === currentId);
      if (!a) return;
      const idx = parseInt(el.dataset.idx);
      a.tags_propios.splice(idx, 1);
      guardarEdicion(currentId, 'tags_propios', [...a.tags_propios]);
      renderTagsPropios(a.tags_propios);
    });
  });
}

function agregarTag(e) {
  if (e.key !== 'Enter') return;
  const input = e.target;
  const val = input.value.trim();
  if (!val) return;

  const a = catalogo.find(x => x.id === currentId);
  if (!a) return;
  if (!a.tags_propios) a.tags_propios = [];
  if (!a.tags_propios.includes(val)) {
    a.tags_propios.push(val);
    guardarEdicion(currentId, 'tags_propios', [...a.tags_propios]);
    renderTagsPropios(a.tags_propios);
  }
  input.value = '';
}

// --- FEATURE PRESENTATION --------------------------------------------------
// Muestra un disco aleatorio como "pieza destacada" al entrar.
// Cambia cada vez que recargas la página.

function renderFeature() {
  if (catalogo.length === 0) {
    document.getElementById('feature').style.display = 'none';
    return;
  }

  // Disco aleatorio
  const idx = Math.floor(Math.random() * catalogo.length);
  const a = catalogo[idx];

  const featureEl = document.getElementById('feature');
  featureEl.style.display = 'flex';
  featureEl.onclick = () => abrirModal(a.id);

  // Artwork
  document.getElementById('feature-art').innerHTML = a.artwork_url
    ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}">`
    : '';

  // Info (textContent ya es seguro)
  document.getElementById('feature-album').textContent = a.album;
  document.getElementById('feature-artist').textContent = a.artista;

  // Meta
  const meta = [a.anio, a.sello, a.num_tracks ? a.num_tracks + ' tracks' : '']
    .filter(Boolean).join(' · ');
  document.getElementById('feature-meta').textContent = meta;

  // Notas (si tiene)
  const notesEl = document.getElementById('feature-notes');
  if (a.notas) {
    notesEl.textContent = '« ' + a.notas + ' »';
    notesEl.style.display = 'block';
  } else {
    notesEl.style.display = 'none';
  }

  // Tags propios
  const tagsEl = document.getElementById('feature-tags');
  if (a.tags_propios && a.tags_propios.length > 0) {
    tagsEl.innerHTML = a.tags_propios
      .map(t => `<span class="tag tag-own">${escapeHtml(t)}</span>`).join('');
  } else {
    tagsEl.innerHTML = '';
  }

  // Estrellas en el rating
  if (a.rating > 0) {
    document.getElementById('feature-meta').textContent =
      meta + ' · ' + '★'.repeat(a.rating);
  }
}

// Ocultar feature cuando hay búsqueda activa
function updateFeatureVisibility() {
  const q = document.getElementById('search').value.trim();
  const genero = document.getElementById('filter-genero').value;
  const decada = document.getElementById('filter-decada').value;
  const rating = document.getElementById('filter-rating').value;
  const hasFilter = q || genero || decada || rating || showFavOnly;

  document.getElementById('feature').style.display = hasFilter ? 'none' : 'flex';
}

// --- SIDEBAR RELEASES (al clickear un día del calendario) ------------------

function mostrarReleasesDelDia(releases, dia, mes) {
  const container = document.getElementById('sidebar-releases');

  if (!releases || releases.length === 0) {
    container.innerHTML = '';
    return;
  }

  const mesNombre = MONTHS[mes];
  const anioActual = new Date().getFullYear();

  let html = `<div class="sidebar-day-label">${dia} de ${mesNombre}</div>`;

  releases.forEach(a => {
    const aniosAtras = anioActual - a.anio;
    html += `
      <div class="sidebar-release" onclick="abrirModal('${a.id}')">
        ${a.artwork_url ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}">` : ''}
        <div class="sidebar-release-info">
          <div class="sidebar-release-album">${escapeHtml(a.album)}</div>
          <div class="sidebar-release-meta">${escapeHtml(a.artista)} · ${a.anio} (${UI.yearsAgo(aniosAtras)})</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// --- PERSISTENCIA ----------------------------------------------------------

function guardarEdicion(id, campo, valor) {
  if (!ediciones[id]) ediciones[id] = {};
  ediciones[id][campo] = valor;
  safeSetItem(CONFIG.storageKey, JSON.stringify(ediciones));
}

function exportarJSON() {
  // Genera un array con todos los álbumes que tienen ediciones
  const exportData = catalogo
    .filter(a => ediciones[a.id])
    .map(a => {
      const obj = { id: a.id };
      // P10 — Claves ordenadas alfabéticamente para diffs Git limpios
      EDITABLE_FIELDS.forEach(campo => {
        if (a[campo] !== undefined) obj[campo] = a[campo];
      });
      return obj;
    });

  // P10 — Claves ordenadas en el JSON exportado
  const jsonStr = JSON.stringify(exportData, Object.keys(exportData[0] || {}).sort(), 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'ediciones_web.json';
  link.click();
  URL.revokeObjectURL(url);
}

// --- EVENTOS ---------------------------------------------------------------

document.getElementById('search').addEventListener('input', renderizar);
document.getElementById('filter-genero').addEventListener('change', renderizar);
document.getElementById('filter-decada').addEventListener('change', renderizar);
document.getElementById('filter-rating').addEventListener('change', renderizar);

document.getElementById('btn-todos').addEventListener('click', () => {
  showFavOnly = false;
  document.getElementById('btn-todos').classList.add('active');
  document.getElementById('btn-fav').classList.remove('active');
  renderizar();
});
document.getElementById('btn-fav').addEventListener('click', () => {
  showFavOnly = true;
  document.getElementById('btn-fav').classList.add('active');
  document.getElementById('btn-todos').classList.remove('active');
  renderizar();
});

document.getElementById('modal-close').addEventListener('click', cerrarModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) cerrarModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') cerrarModal();
});

document.getElementById('modal-fav').addEventListener('click', toggleFavorito);
document.getElementById('modal-tags-input').addEventListener('keydown', agregarTag);
document.getElementById('btn-export').addEventListener('click', exportarJSON);

// ============================================================================
// CALENDARIO — "Un día como hoy"
// ============================================================================
// Muestra un calendario mensual. Los días donde algún disco de la colección
// se lanzó (mismo día+mes, cualquier año) aparecen marcados con acento dorado.
// Si hoy coincide con un release, se muestra un banner en la cabecera.
// ============================================================================

let calYear, calMonth; // Estado del calendario visible

// Inicializar con el mes actual
function initCalendario() {
  const hoy = new Date();
  calYear = hoy.getFullYear();
  calMonth = hoy.getMonth();
  renderCalendario();
  renderTodayBanner();
}

// Construye un mapa: "MM-DD" → [array de álbumes que se lanzaron ese día]
// Solo incluye álbumes con fecha_precision === "day"
function buildReleaseMap() {
  const map = {};
  catalogo.forEach(a => {
    if (a.fecha_precision !== 'day' || !a.fecha_lanzamiento) return;
    // fecha_lanzamiento es "YYYY-MM-DD"
    const parts = a.fecha_lanzamiento.split('-');
    if (parts.length < 3) return;
    const key = parts[1] + '-' + parts[2]; // "06-16"
    if (!map[key]) map[key] = [];
    map[key].push(a);
  });
  return map;
}

function renderCalendario() {
  const releaseMap = buildReleaseMap();
  const hoy = new Date();
  const todayStr = String(hoy.getMonth() + 1).padStart(2, '0') + '-' +
                   String(hoy.getDate()).padStart(2, '0');

  // Label del mes
  document.getElementById('cal-month-label').textContent =
    MONTHS[calMonth] + ' ' + calYear;

  // Calcular primer día del mes y total de días
  const primerDia = new Date(calYear, calMonth, 1);
  const diasEnMes = new Date(calYear, calMonth + 1, 0).getDate();

  // getDay() devuelve 0=dom. Convertir a 0=lunes para grilla española
  let startDow = primerDia.getDay() - 1;
  if (startDow < 0) startDow = 6;

  const grid = document.getElementById('cal-grid');
  let html = '';

  // Headers de día de semana
  DAYS.forEach(d => {
    html += `<div class="cal-dow">${d}</div>`;
  });

  // Celdas vacías antes del día 1
  for (let i = 0; i < startDow; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  // Días del mes
  for (let day = 1; day <= diasEnMes; day++) {
    const mm = String(calMonth + 1).padStart(2, '0');
    const dd = String(day).padStart(2, '0');
    const key = mm + '-' + dd;
    const releases = releaseMap[key] || [];
    const isToday = (calMonth === hoy.getMonth() &&
                     calYear === hoy.getFullYear() &&
                     day === hoy.getDate());

    let classes = 'cal-day';
    if (releases.length > 0) classes += ' has-release';
    if (isToday) classes += ' today';

    let tooltip = '';
    if (releases.length > 0) {
      const items = releases.map(a => {
        const artImg = a.artwork_url
          ? `<img class="cal-tooltip-art" src="${a.artwork_url}" alt="">`
          : '';
        return `<div style="margin-bottom:3px">${artImg}<span class="cal-tooltip-text"><span class="cal-tooltip-album">${escapeHtml(a.album)}</span><br><span class="cal-tooltip-artist">${escapeHtml(a.artista)}</span> <span class="cal-tooltip-year">(${a.anio})</span></span></div>`;
      }).join('');
      tooltip = `<div class="cal-tooltip">${items}</div>`;
    }

    const clickAttr = releases.length > 0
      ? `onclick="onCalDayClick(${day}, ${calMonth}, '${key}')"` : '';

    html += `<div class="${classes}" ${clickAttr}>${day}${tooltip}</div>`;
  }

  grid.innerHTML = html;
}

// Handler para click en día del calendario
function onCalDayClick(day, month, key) {
  const releaseMap = buildReleaseMap();
  const releases = releaseMap[key] || [];

  // Siempre mostrar en sidebar
  mostrarReleasesDelDia(releases, day, month);

  // Si es un solo disco, también abrir modal
  if (releases.length === 1) {
    abrirModal(releases[0].id);
  }
}

function renderTodayBanner() {
  const hoy = new Date();
  const mm = String(hoy.getMonth() + 1).padStart(2, '0');
  const dd = String(hoy.getDate()).padStart(2, '0');
  const key = mm + '-' + dd;
  const releaseMap = buildReleaseMap();
  const releases = releaseMap[key] || [];

  const banner = document.getElementById('today-banner');

  if (releases.length === 0) {
    banner.classList.remove('visible');
    banner.innerHTML = '';
    return;
  }

  const anioActual = hoy.getFullYear();
  const items = releases.map(a => {
    const aniosAtras = anioActual - a.anio;
    const artImg = a.artwork_url
      ? `<img src="${a.artwork_url}" alt="${escapeHtml(a.album)}">`
      : '';
    return `<div class="today-release" onclick="abrirModal('${a.id}')">
      ${artImg}
      <div class="today-release-info">
        <div class="today-release-album">${escapeHtml(a.album)}</div>
        <div class="today-release-meta">${escapeHtml(a.artista)} · ${UI.yearsAgo(aniosAtras)}</div>
      </div>
    </div>`;
  }).join('');

  banner.innerHTML = `<span class="today-banner-label">${UI.bannerLabel}</span>${items}`;
  banner.classList.add('visible');
}

// Navegación del calendario
document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendario();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendario();
});

// --- INICIO ----------------------------------------------------------------
cargar();
</script>
